name: traqio
description: "Traqio - Business Operating System for SMBs"
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: '>=3.10.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State Management
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # Navigation
  go_router: ^14.2.0

  # Backend
  supabase_flutter: ^2.5.6

  # Functional / Error Handling
  fpdart: ^1.1.0

  # Value equality
  equatable: ^2.0.5

  # Code generation helpers
  freezed_annotation: ^2.4.4
  json_annotation: ^4.9.0

  # UI
  google_fonts: ^6.2.1
  flutter_svg: ^2.0.10+1
  fl_chart: ^0.68.0
  shimmer: ^3.0.0

  # Utilities
  intl: ^0.19.0
  logger: ^2.4.0
  cached_network_image: ^3.3.1
  flutter_dotenv: ^5.1.0

  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^4.0.0

  build_runner: ^2.4.11
  freezed: ^2.5.4
  json_serializable: ^6.8.0
  riverpod_generator: ^2.4.3

flutter:
  uses-material-design: true
  assets:
    - .env
    - assets/images/
    - assets/icons/
